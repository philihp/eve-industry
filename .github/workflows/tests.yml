name: tests

on:
  push:
  pull_request:

env:
  CI: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build
